project:
  type: book

execute: 
  freeze: auto
  error: true
  warning: false

engine: knitr

knitr:
  opts_chunk:
    comment: "#>"

book:
  title: "Lecture 5: R Group Comparison"
  author: "gaoch"
  date: now
  chapters:
    - index.qmd
    - summary.qmd
    - r-basic.qmd
    - datasets-in-r.qmd
    - grouped-data-analysis.qmd
    - grouped-data-analysis-in-action.qmd
    - references.qmd

bibliography: references.bib

crossref:
  fig-title: "图"
  tbl-title: "表"
  fig-prefix: "图"
  tbl-prefix: "表"

format:
  html:
    theme: cosmo
    code-overflow: wrap
  pdf:
    documentclass: custom
    papersize: a4paper
    fontsize: 9pt
    include-in-header: preamble.tex
    code-overflow: wrap
    fig-width: 6
    fig-height: 4
